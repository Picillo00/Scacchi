<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meta Glasses Mario Pro</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 600px;
            height: 600px;
            background-color: #000000; /* Nero assoluto = Trasparente sugli occhiali */
            overflow: hidden;
            font-family: 'Courier New', sans-serif;
        }
        canvas {
            width: 600px;
            height: 600px;
            display: block;
            background: #000000;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="600" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Stato di gioco
        let mario = { x: 80, y: 430, size: 30, vy: 0, jumping: false };
        let obstacles = [];
        let clouds = [{ x: 200, y: 100, speed: 0.5 }, { x: 500, y: 150, speed: 0.3 }];
        let score = 0;
        let gameOver = false;
        const gravity = 0.7;

        function spawnObstacle() {
            if (Math.random() < 0.015 && obstacles.length < 2) {
                // Alterna tra tubi alti e bassi
                let height = Math.random() > 0.5 ? 50 : 35;
                obstacles.push({ x: 600, y: 460 - height, width: 30, height: height });
            }
        }

        function update() {
            if (gameOver) return;

            // Fisica del Salto
            mario.vy += gravity;
            mario.y += mario.vy;
            if (mario.y >= 430) {
                mario.y = 430;
                mario.vy = 0;
                mario.jumping = false;
            }

            // Muovi nuvole sullo sfondo
            clouds.forEach(c => {
                c.x -= c.speed;
                if (c.x < -60) c.x = 600;
            });

            spawnObstacle();

            // Gestione ostacoli e collisioni rigide
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= 6; // Velocità scorrimento

                // Hitbox precisa
                if (
                    mario.x < obstacles[i].x + obstacles[i].width &&
                    mario.x + mario.size > obstacles[i].x &&
                    mario.y < obstacles[i].y + obstacles[i].height &&
                    mario.y + mario.size > obstacles[i].y
                ) {
                    gameOver = true;
                }

                if (obstacles[i].x < -30) {
                    obstacles.splice(i, 1);
                    score++;
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, 600, 600);

            // 1. DISEGNA LE NUVOLE (Elementi AR leggeri nel cielo)
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            clouds.forEach(c => {
                ctx.beginPath();
                ctx.arc(c.x, c.y, 15, 0, Math.PI * 2);
                ctx.arc(c.x + 15, c.y - 10, 20, 0, Math.PI * 2);
                ctx.arc(c.x + 35, c.y, 15, 0, Math.PI * 2);
                ctx.fill();
            });

            // 2. TERRENO (Stile mattone Mario, visibile ma non coprente)
            ctx.fillStyle = '#5c2c16'; // Marrone terra
            ctx.fillRect(0, 460, 600, 140);
            ctx.fillStyle = '#9c4a21'; // Linea mattoni superiore
            ctx.fillRect(0, 460, 600, 8);

            // 3. TUBO VERDE (Ostacolo)
            obstacles.forEach(obs => {
                ctx.fillStyle = '#00a800'; // Verde scuro tubo
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                ctx.fillStyle = '#4ade80'; // Lucentezza tubo
                ctx.fillRect(obs.x + 3, obs.y, 6, obs.height);
                // Bordo superiore del tubo
                ctx.fillStyle = '#007000';
                ctx.fillRect(obs.x - 2, obs.y, obs.width + 4, 10);
            });

            // 4. SUPER MARIO
            ctx.fillStyle = '#ff1a1a'; // Corpo Rosso
            ctx.fillRect(mario.x, mario.y, mario.size, mario.size);
            ctx.fillStyle = '#0055ff'; // Salopette Blu
            ctx.fillRect(mario.x + 5, mario.y + 15, 20, 15);
            ctx.fillStyle = '#ffe0a3'; // Faccia
            ctx.fillRect(mario.x + 15, mario.y + 5, 12, 10);
            ctx.fillStyle = '#b38600'; // Scarpe
            ctx.fillRect(mario.x, mario.y + 27, 12, 4);
            ctx.fillRect(mario.x + 18, mario.y + 27, 12, 4);

            // 5. INTERFACCIA DI GIOCO (HUD)
            ctx.fillStyle = '#ffff00';
            ctx.font = 'bold 22px "Courier New"';
            ctx.fillText('MARIO', 40, 40);
            ctx.fillStyle = '#ffffff';
            ctx.fillText(String(score).padStart(6, '0'), 40, 65);

            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(0, 0, 600, 460);
                
                ctx.fillStyle = '#ff1a1a';
                ctx.font = 'bold 36px "Courier New"';
                ctx.fillText('GAME OVER', 200, 220);
                
                ctx.fillStyle = '#ffffff';
                ctx.font = '18px "Courier New"';
                ctx.fillText('FAI TAP SUL FUSTO', 205, 270);
                ctx.fillText('PER RICOMINCIARE', 210, 295);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // --- SISTEMA DI INPUT ADATTATO AI META GLASSES ---
        function triggerJump() {
            if (gameOver) {
                mario.y = 430;
                obstacles = [];
                score = 0;
                gameOver = false;
            } else if (!mario.jumping) {
                mario.vy = -13; // Spinta salto
                mario.jumping = true;
            }
        }

        // Cattura tutti i possibili input inviati dagli occhiali
        window.addEventListener('click', (e) => { e.preventDefault(); triggerJump(); }, { passive: false });
        window.addEventListener('touchstart', (e) => { e.preventDefault(); triggerJump(); }, { passive: false });
        window.addEventListener('keydown', (e) => {
            // Spesso gli occhiali mappano il tap sulla tastiera come Enter (13) o Spacebar (32)
            if (e.keyCode === 32 || e.keyCode === 13) {
                e.preventDefault();
                triggerJump();
            }
        });

        // Forza il focus sulla pagina web in AR per ricevere i comandi
        window.focus();
        document.body.addEventListener('click', () => { window.focus(); });

        gameLoop();
    </script>
</body>
</html>
