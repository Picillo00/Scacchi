<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- FORZATURA ANTI-CACHE TOTALMENTE AGGRESSIVA -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>Neural Note HUD - v4.1 (Pure Inject)</title>

    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #050505; font-family: sans-serif; color: #ffffff;
            user-select: none; touch-action: none;
        }

        #hud-container {
            position: relative; width: 100vw; height: 100vh;
            border: 3px solid #ffaa00; box-shadow: 0 0 15px rgba(255, 170, 0, 0.4);
            display: flex; flex-direction: column; justify-content: space-between; padding: 15px;
        }

        .hud-header {
            display: flex; justify-content: space-between; align-items: center;
        }

        .logo { color: #ffaa00; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 8px #ffaa00; }
        
        .version-tag {
            background: #ffaa00; color: black; padding: 5px 12px; 
            border-radius: 5px; font-weight: bold; font-size: 1.1rem;
            box-shadow: 0 0 10px #ffaa00;
        }

        #canvas-area {
            flex-grow: 1; width: 100%; display: flex; justify-content: center; align-items: center; margin: 10px 0;
            position: relative;
        }

        canvas { background-color: #0a0a0a; border: 2px solid rgba(255, 170, 0, 0.2); border-radius: 8px; }

        /* Mirino virtuale per l'indice */
        #pointer-dot {
            position: absolute; width: 14px; height: 14px; background: #00ffaa;
            border-radius: 50%; box-shadow: 0 0 12px #00ffaa; pointer-events: none;
            transform: translate(-50%, -50%); left: 50%; top: 50%;
            transition: transform 0.05s linear;
        }

        .controls-row { display: flex; justify-content: center; gap: 10px; align-items: center; flex-wrap: wrap; }

        #debug-panel {
            font-family: monospace; font-size: 0.75rem; color: #aaa;
            background: rgba(255, 255, 255, 0.05); padding: 8px; border-radius: 5px;
            border: 1px solid #333; text-align: left; min-width: 260px;
        }

        .hud-btn {
            background: rgba(255, 170, 0, 0.1); border: 1px solid #ffaa00; color: #ffaa00;
            padding: 8px 15px; font-size: 0.9rem; border-radius: 20px; font-weight: bold; cursor: pointer;
        }
        .hud-btn:active { background: #ffaa00; color: #050505; }
    </style>
</head>
<body>

    <div id="hud-container">
        <!-- BARRA SUPERIORE -->
        <div class="hud-header">
            <div class="logo">NEURAL LINK // DIRECT INJECT</div>
            <div class="version-tag">VERSIONE: v4.1</div>
        </div>

        <!-- AREA NOTA CON PUNTATORE MANO -->
        <div id="canvas-area">
            <canvas id="paintCanvas"></canvas>
            <div id="pointer-dot"></div>
        </div>

        <!-- REPARTO DIAGNOSTICA -->
        <div class="controls-row">
            <div id="debug-panel">
                <strong>RICEZIONE PACCHETTI:</strong> <span id="log-packet" style="color: #ff0055;">NESSUNO RILEVATO</span><br>
                <strong>COORDINATE NEURALI:</strong> X: <span id="log-x">--</span> | Y: <span id="log-y">--</span><br>
                <strong>STATO DI SCRITTURA:</strong> <span id="log-writing">ALZATO</span>
            </div>
            
            <button class="hud-btn" onclick="clearCanvas()">Pulisci Schermo</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("paintCanvas");
        const ctx = canvas.getContext("2d");
        const canvasArea = document.getElementById("canvas-area");
        const pointerDot = document.getElementById("pointer-dot");
        
        const logPacket = document.getElementById("log-packet");
        const logX = document.getElementById("log-x");
        const logY = document.getElementById("log-y");
        const logWriting = document.getElementById("log-writing");

        let drawingHistory = [];
        let lastX = 0, lastY = 0;

        function resizeCanvas() {
            canvas.width = canvasArea.clientWidth - 10;
            canvas.height = canvasArea.clientHeight - 10;
            ctx.strokeStyle = "#ffaa00"; // Arancio HUD ad alta visibilità
            ctx.lineJoin = "round"; ctx.lineCap = "round"; ctx.lineWidth = 5;
            saveState();
        }

        // ====================================================================
        //  L'UNICA FUNZIONE ATTIVA: L'INIEZIONE RIGIDA DEI DATI DEL BRACCIALE
        // ====================================================================
        /**
         * Chiamata forzatamente dall'esterno per spostare il dito e scrivere
         * @param {number} x - Valore da 0 a 100 (posizione orizzontale del dito sulla superficie)
         * @param {number} y - Valore da 0 a 100 (posizione verticale del dito sulla superficie)
         * @param {boolean} isTouching - true se il sensore EMG rileva la pressione sulla superficie, false se sollevato
         */
        function updateNeuralFinger(x, y, isTouching) {
            // Segnala immediatamente che l'hardware sta parlando con la pagina
            logPacket.innerText = "RICEVUTO OK!";
            logPacket.style.color = "#00ffaa";

            logX.innerText = Math.round(x);
            logY.innerText = Math.round(y);

            // Traduzione delle percentuali in pixel effettivi dello schermo AR
            const actualX = (x / 100) * canvas.width;
            const actualY = (y / 100) * canvas.height;

            // Sposta il cursore sullo schermo degli occhiali
            pointerDot.style.left = `${actualX + 5}px`;
            pointerDot.style.top = `${actualY + 5}px`;

            if (isTouching) {
                logWriting.innerText = "✍️ SCRITTURA IN CORSO";
                logWriting.style.color = "#00ffaa";

                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(actualX, actualY);
                ctx.stroke();
            } else {
                logWriting.innerText = "SPOSTAMENTO (Penna Alzata)";
                logWriting.style.color = "#ffaa00";
            }

            // Aggiorna sempre l'ultima posizione conosciuta
            lastX = actualX;
            lastY = actualY;
        }

        // Esposizione totale della funzione alla finestra principale
        window.updateNeuralFinger = updateNeuralFinger;

        // ==========================================
        //  FUNZIONI CANVAS
        // ==========================================
        function saveState() {
            if (drawingHistory.length >= 10) drawingHistory.shift();
            drawingHistory.push(canvas.toDataURL());
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawingHistory = []; saveState();
            logPacket.innerText = "IN ATTESA...";
            logPacket.style.color = "#ff0055";
        }

        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 150);
    </script>
</body>
</html>
