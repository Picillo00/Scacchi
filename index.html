<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- ISTRUZIONI ANTI-CACHE -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>Neural Note HUD - Handwriting Edition</title>

    <style>
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            user-select: none;
            touch-action: none;
        }

        #hud-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            border: 3px solid #00ffaa; /* Verde Neon per modalità scrittura */
            box-shadow: 0 0 15px rgba(0, 255, 170, 0.4);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px;
        }

        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
            color: #aaaaaa;
        }

        .logo {
            color: #00ffaa;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 170, 0.4);
        }

        /* AREA DI DISEGNO / SCRITTURA */
        #canvas-area {
            flex-grow: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin: 10px 0;
        }

        canvas {
            background-color: #0a0a0a;
            border: 1px dashed rgba(0, 255, 170, 0.3);
            border-radius: 8px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
            cursor: crosshair;
        }

        /* Pannello dei comandi rapidi touchabili */
        .controls-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 5px;
        }

        .hud-btn {
            background: rgba(0, 255, 170, 0.1);
            border: 1px solid #00ffaa;
            color: #00ffaa;
            padding: 8px 20px;
            font-size: 1rem;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .hud-btn:active {
            background: #00ffaa;
            color: #050505;
            box-shadow: 0 0 15px #00ffaa;
        }

        .hud-footer {
            font-size: 0.85rem;
            color: #555;
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div id="hud-container">
        <!-- BARRA SUPERIORE -->
        <div class="hud-header">
            <div class="logo">NEURAL NOTE // HUD</div>
            <div id="status-mode">MODALITÀ: TRACCIAMENTO INDICE</div>
        </div>

        <!-- CANVAS PER SCRIVERE CON L'INDICE -->
        <div id="canvas-area">
            <canvas id="paintCanvas"></canvas>
        </div>

        <!-- PULSANTI AD ALTO CONTRASTO -->
        <div class="controls-row">
            <button class="hud-btn" onclick="clearCanvas()">Pulisci Pagina</button>
            <button class="hud-btn" style="border-color: #ff0055; color: #ff0055;" onclick="undoLastStroke()">Cancella Ultimo Tratto</button>
        </div>

        <!-- INFO BANNER -->
        <div class="hud-footer">
            Poggia l'indice e disegna sulla superficie per scrivere le lettere dell'HUD.<br>
            La Neural Band rileva la pressione e la direzione del dito in tempo reale.
        </div>
    </div>

    <script>
        const canvas = document.getElementById("paintCanvas");
        const ctx = canvas.getContext("2d");
        const canvasArea = document.getElementById("canvas-area");

        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        
        // Array per salvare la cronologia dei tratti (funzione Annulla/Undo)
        let drawingHistory = [];

        function resizeCanvas() {
            // Adatta il foglio per le note alla dimensione dello schermo degli occhiali
            canvas.width = canvasArea.clientWidth - 10;
            canvas.height = canvasArea.clientHeight - 10;
            
            // Impostazioni del pennello stile Neon HUD
            ctx.strokeStyle = "#00ffaa";
            ctx.lineJoin = "round";
            ctx.lineCap = "round";
            ctx.lineWidth = 4; // Spessore ideale per la visibilità in AR
            ctx.shadowBlur = 8;
            ctx.shadowColor = "#00ffaa";
            
            saveState(); // Salva lo stato vuoto iniziale
        }

        // AGGANCIO DEI COMPORTAMENTI DI SCRITTURA (TOUCH / SURFACE / NEURAL BAND)
        canvas.addEventListener("mousedown", startDrawing);
        canvas.addEventListener("mousemove", draw);
        window.addEventListener("mouseup", stopDrawing);

        canvas.addEventListener("touchstart", (e) => {
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent("mousedown", {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        }, { passive: false });

        canvas.addEventListener("touchmove", (e) => {
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent("mousemove", {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
            e.preventDefault(); // Impedisce lo scroll della pagina mentre scrivi con l'indice
        }, { passive: false });

        window.addEventListener("touchend", () => {
            const mouseEvent = new MouseEvent("mouseup", {});
            window.dispatchEvent(mouseEvent);
        });

        // LOGICA DI DISEGNO
        function startDrawing(e) {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            // Calcola la posizione esatta del dito sul canvas
            lastX = e.clientX - rect.left;
            lastY = e.clientY - rect.top;
        }

        function draw(e) {
            if (!isDrawing) return;
            
            const rect = canvas.getBoundingClientRect();
            const currentX = e.clientX - rect.left;
            const currentY = e.clientY - rect.top;

            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(currentX, currentY);
            ctx.stroke();

            lastX = currentX;
            lastY = currentY;
        }

        function stopDrawing() {
            if (isDrawing) {
                isDrawing = false;
                saveState(); // Salva la lettera o la linea appena disegnata
            }
        }

        // SALVATAGGIO STATO PER UNDO
        function saveState() {
            // Tiene in memoria gli ultimi 20 tratti per non sovraccaricare la RAM degli occhiali
            if (drawingHistory.length >= 20) {
                drawingHistory.shift();
            }
            drawingHistory.push(canvas.toDataURL());
        }

        // TORNA INDIETRO DI UN TRATTO
        function undoLastStroke() {
            if (drawingHistory.length > 1) {
                drawingHistory.pop(); // Rimuove lo stato attuale
                const previousStateImg = new Image();
                previousStateImg.src = drawingHistory[drawingHistory.length - 1];
                previousStateImg.onload = function() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(previousStateImg, 0, 0);
                };
            } else if (drawingHistory.length === 1) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }

        // PULISCE COMPLETAMENTE LA NOTA
        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawingHistory = [];
            saveState();
        }

        // Esegui il setup dinamico all'avvio
        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 100);

    </script>
</body>
</html>
