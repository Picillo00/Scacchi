<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meta Neural Mario</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 600px;
            height: 600px;
            background-color: #000000;
            overflow: hidden;
            font-family: 'Courier New', sans-serif;
        }
        canvas {
            width: 600px;
            height: 600px;
            display: block;
            background: #000000;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="600" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Stato di gioco
        let mario = { x: 80, y: 430, size: 30, vy: 0, jumping: false };
        let obstacles = [];
        let clouds = [{ x: 200, y: 100, speed: 0.5 }, { x: 500, y: 150, speed: 0.3 }];
        let score = 0;
        let gameOver = false;
        const gravity = 0.7;

        // Stato dei pulsanti del gamepad/banda per evitare input continui
        let buttonPressedOld = false;

        function spawnObstacle() {
            if (Math.random() < 0.015 && obstacles.length < 2) {
                let height = Math.random() > 0.5 ? 50 : 35;
                obstacles.push({ x: 600, y: 460 - height, width: 30, height: height });
            }
        }

        function triggerJump() {
            if (gameOver) {
                mario.y = 430;
                obstacles = [];
                score = 0;
                gameOver = false;
            } else if (!mario.jumping) {
                mario.vy = -13;
                mario.jumping = true;
            }
        }

        // CONTROLLO COSTANTE DELLA BANDA NEURALE (GAMEPAD API)
        function checkNeuralInput() {
            // Prendi tutti i controller connessi (la banda neurale viene spesso vista come Gamepad 0 o 1)
            const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
            
            for (let i = 0; i < gamepads.length; i++) {
                const gp = gamepads[i];
                if (gp) {
                    // Controlla se un qualsiasi pulsante del controller/banda (es. il pinch della mano) è premuto
                    let anyButtonPressed = gp.buttons.some(b => b.pressed || b.value > 0.5);
                    
                    // Se rileva il gesto e nel frame precedente non era premuto, salta
                    if (anyButtonPressed && !buttonPressedOld) {
                        triggerJump();
                    }
                    buttonPressedOld = anyButtonPressed;
                    break; 
                }
            }
        }

        function update() {
            // Controlla la banda ad ogni singolo frame del gioco
            checkNeuralInput();

            if (gameOver) return;

            mario.vy += gravity;
            mario.y += mario.vy;
            if (mario.y >= 430) {
                mario.y = 430;
                mario.vy = 0;
                mario.jumping = false;
            }

            clouds.forEach(c => {
                c.x -= c.speed;
                if (c.x < -60) c.x = 600;
            });

            spawnObstacle();

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= 6;

                if (
                    mario.x < obstacles[i].x + obstacles[i].width &&
                    mario.x + mario.size > obstacles[i].x &&
                    mario.y < obstacles[i].y + obstacles[i].height &&
                    mario.y + mario.size > obstacles[i].y
                ) {
                    gameOver = true;
                }

                if (obstacles[i].x < -30) {
                    obstacles.splice(i, 1);
                    score++;
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, 600, 600);

            // Nuvole
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            clouds.forEach(c => {
                ctx.beginPath();
                ctx.arc(c.x, c.y, 15, 0, Math.PI * 2);
                ctx.arc(c.x + 15, c.y - 10, 20, 0, Math.PI * 2);
                ctx.arc(c.x + 35, c.y, 15, 0, Math.PI * 2);
                ctx.fill();
            });

            // Terreno
            ctx.fillStyle = '#5c2c16';
            ctx.fillRect(0, 460, 600, 140);
            ctx.fillStyle = '#9c4a21';
            ctx.fillRect(0, 460, 600, 8);

            // Tubo
            obstacles.forEach(obs => {
                ctx.fillStyle = '#00a800';
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                ctx.fillStyle = '#4ade80';
                ctx.fillRect(obs.x + 3, obs.y, 6, obs.height);
                ctx.fillStyle = '#007000';
                ctx.fillRect(obs.x - 2, obs.y, obs.width + 4, 10);
            });

            // Mario
            ctx.fillStyle = '#ff1a1a';
            ctx.fillRect(mario.x, mario.y, mario.size, mario.size);
            ctx.fillStyle = '#0055ff';
            ctx.fillRect(mario.x + 5, mario.y + 15, 20, 15);
            ctx.fillStyle = '#ffe0a3';
            ctx.fillRect(mario.x + 15, mario.y + 5, 12, 10);

            // HUD
            ctx.fillStyle = '#ffff00';
            ctx.font = 'bold 22px "Courier New"';
            ctx.fillText('MARIO', 40, 40);
            ctx.fillStyle = '#ffffff';
            ctx.fillText(String(score).padStart(6, '0'), 40, 65);

            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(0, 0, 600, 460);
                ctx.fillStyle = '#ff1a1a';
                ctx.font = 'bold 36px "Courier New"';
                ctx.fillText('GAME OVER', 200, 220);
                ctx.fillStyle = '#ffffff';
                ctx.font = '18px "Courier New"';
                ctx.fillText('FAI LA GESTURE DELLA MANO', 160, 270);
                ctx.fillText('PER RICOMINCIARE', 210, 295);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Mantieni attivi anche i vecchi input per sicurezza (Touch e Tastiera generica)
        window.addEventListener('click', () => { triggerJump(); });
        window.addEventListener('touchstart', () => { triggerJump(); });
        window.addEventListener('keydown', (e) => {
            if (e.keyCode === 32 || e.keyCode === 13 || e.keyCode === 38) {
                triggerJump();
            }
        });

        // Eventi di selezione generici per interfacce XR spaziali
        window.addEventListener('select', () => { triggerJump(); });
        window.addEventListener('selectstart', () => { triggerJump(); });

        gameLoop();
    </script>
</body>
</html>
