<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- FORZATURA ANTI-CACHE TOTALMENTE AGGRESSIVA -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>Neural Note HUD - v3.1</title>

    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #050505; font-family: sans-serif; color: #ffffff;
            user-select: none; touch-action: none;
        }

        #hud-container {
            position: relative; width: 100vw; height: 100vh;
            border: 3px solid #00ffaa; box-shadow: 0 0 15px rgba(0, 255, 170, 0.4);
            display: flex; flex-direction: column; justify-content: space-between; padding: 15px;
        }

        .hud-header {
            display: flex; justify-content: space-between; align-items: center;
        }

        .logo { color: #00ffaa; font-weight: bold; letter-spacing: 2px; }
        
        /* VERSIONE GIGANTE PER CONTROLLO */
        .version-tag {
            background: #ff0055; color: white; padding: 5px 12px; 
            border-radius: 5px; font-weight: bold; font-size: 1.1rem;
            box-shadow: 0 0 10px #ff0055;
        }

        #canvas-area {
            flex-grow: 1; width: 100%; display: flex; justify-content: center; align-items: center; margin: 10px 0;
        }

        canvas { background-color: #0a0a0a; border: 2px solid rgba(0, 255, 170, 0.2); border-radius: 8px; }

        .controls-row { display: flex; justify-content: center; gap: 10px; align-items: center; flex-wrap: wrap; }

        #debug-panel {
            font-family: monospace; font-size: 0.75rem; color: #aaa;
            background: rgba(255, 255, 255, 0.05); padding: 8px; border-radius: 5px;
            border: 1px solid #333; text-align: left; min-width: 220px;
        }

        .hud-btn {
            background: rgba(0, 255, 170, 0.1); border: 1px solid #00ffaa; color: #00ffaa;
            padding: 8px 15px; font-size: 0.9rem; border-radius: 20px; font-weight: bold; cursor: pointer;
        }
        .hud-btn:active { background: #00ffaa; color: #050505; }
    </style>
</head>
<body>

    <div id="hud-container">
        <!-- BARRA SUPERIORE CON VERSIONE -->
        <div class="hud-header">
            <div class="logo">NEURAL NOTE // HUD</div>
            <div class="version-tag">VERSIONE: v3.1</div>
        </div>

        <!-- AREA NOTA -->
        <div id="canvas-area">
            <canvas id="paintCanvas"></canvas>
        </div>

        <!-- PANNELLO DI CONTROLLO E DEBUG -->
        <div class="controls-row">
            <div id="debug-panel">
                <strong>HARDWARE LOG:</strong><br>
                <span id="log-band">In attesa di coordinate...</span><br>
                <strong>GIROSCOPIO:</strong> <span id="log-gyro">Non attivato</span>
            </div>
            
            <button class="hud-btn" style="border-color: #ffaa00; color: #ffaa00;" onclick="requestGyroPermission()">Attiva Giroscopio</button>
            <button class="hud-btn" onclick="clearCanvas()">Pulisci</button>
            <button class="hud-btn" style="border-color: #ff0055; color: #ff0055;" onclick="undoLastStroke()">Undo</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("paintCanvas");
        const ctx = canvas.getContext("2d");
        const canvasArea = document.getElementById("canvas-area");
        const logBand = document.getElementById("log-band");
        const logGyro = document.getElementById("log-gyro");

        let drawingHistory = [];
        let isHardwareDrawing = false;
        let lastX = 0, lastY = 0;

        function resizeCanvas() {
            canvas.width = canvasArea.clientWidth - 10;
            canvas.height = canvasArea.clientHeight - 10;
            ctx.strokeStyle = "#00ffaa";
            ctx.lineJoin = "round"; ctx.lineCap = "round"; ctx.lineWidth = 5;
            saveState();
        }

        // ==========================================
        // SBLOCCO E ASCOLTO DEL GIROSCOPIO (Se la banda lo usa tramite browser)
        // ==========================================
        function requestGyroPermission() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                            logGyro.innerText = "ATTIVO (Autorizzato)";
                        } else {
                            logGyro.innerText = "NEGATO dall'utente";
                        }
                    })
                    .catch(err => {
                        logGyro.innerText = "Errore permessi: " + err;
                    });
            } else {
                // Browser senza restrizioni iOS (Android o sistemi integrati)
                window.addEventListener('deviceorientation', handleOrientation);
                logGyro.innerText = "ATTIVO (Standard)";
            }
        }

        function handleOrientation(event) {
            // Legge i movimenti angolari del giroscopio
            let alpha = Math.round(event.alpha || 0); // Rotazione
            let beta = Math.round(event.beta || 0);   // Inclinazione avanti/dietro
            let gamma = Math.round(event.gamma || 0); // Inclinazione sinistra/destra
            
            logGyro.innerText = `A:${alpha}° B:${beta}° G:${gamma}°`;
        }


        // ==========================================
        // RICEZIONE COORDINATE DALLA NEURAL BAND
        // ==========================================
        function receiveNeuralHardwareCoords(action, normalizedX, normalizedY) {
            logBand.innerText = `${action} -> X:${Math.round(normalizedX)} Y:${Math.round(normalizedY)}`;

            const actualX = (normalizedX / 100) * canvas.width;
            const actualY = (normalizedY / 100) * canvas.height;

            if (action === 'START') {
                isHardwareDrawing = true;
                lastX = actualX; lastY = actualY;
            } 
            else if (action === 'MOVE' && isHardwareDrawing) {
                ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(actualX, actualY); ctx.stroke();
                lastX = actualX; lastY = actualY;
            } 
            else if (action === 'STOP') {
                isHardwareDrawing = false;
                saveState();
            }
        }
        window.receiveNeuralHardwareCoords = receiveNeuralHardwareCoords;


        // ==========================================
        // FUNZIONI CANVAS (UNDO / CLEAR)
        // ==========================================
        function saveState() {
            if (drawingHistory.length >= 15) drawingHistory.shift();
            drawingHistory.push(canvas.toDataURL());
        }

        function undoLastStroke() {
            if (drawingHistory.length > 1) {
                drawingHistory.pop();
                const img = new Image(); img.src = drawingHistory[drawingHistory.length - 1];
                img.onload = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0); };
            } else { ctx.clearRect(0, 0, canvas.width, canvas.height); }
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawingHistory = []; saveState();
        }

        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 150);
    </script>
</body>
</html>
