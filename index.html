<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- FORZATURA ANTI-CACHE NEURAL HUD -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>Neural Note HUD - v4.0 (EMG Neural Link)</title>

    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #050505; font-family: sans-serif; color: #ffffff;
            user-select: none; touch-action: none;
        }

        #hud-container {
            position: relative; width: 100vw; height: 100vh;
            border: 3px solid #00e1ff; box-shadow: 0 0 15px rgba(0, 225, 255, 0.4);
            display: flex; flex-direction: column; justify-content: space-between; padding: 15px;
        }

        .hud-header {
            display: flex; justify-content: space-between; align-items: center;
        }

        .logo { color: #00e1ff; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 8px #00e1ff; }
        
        .version-tag {
            background: #00e1ff; color: black; padding: 5px 12px; 
            border-radius: 5px; font-weight: bold; font-size: 1.1rem;
            box-shadow: 0 0 10px #00e1ff;
        }

        #canvas-area {
            flex-grow: 1; width: 100%; display: flex; justify-content: center; align-items: center; margin: 10px 0;
            position: relative;
        }

        canvas { background-color: #0a0a0a; border: 2px solid rgba(0, 225, 255, 0.2); border-radius: 8px; }

        .controls-row { display: flex; justify-content: center; gap: 10px; align-items: center; flex-wrap: wrap; }

        #debug-panel {
            font-family: monospace; font-size: 0.75rem; color: #aaa;
            background: rgba(255, 255, 255, 0.05); padding: 8px; border-radius: 5px;
            border: 1px solid #222; text-align: left; min-width: 250px;
        }

        .hud-btn {
            background: rgba(0, 225, 255, 0.1); border: 1px solid #00e1ff; color: #00e1ff;
            padding: 8px 15px; font-size: 0.9rem; border-radius: 20px; font-weight: bold; cursor: pointer;
        }
        .hud-btn:active { background: #00e1ff; color: #050505; }
    </style>
</head>
<body>

    <div id="hud-container">
        <!-- BARRA SUPERIORE -->
        <div class="hud-header">
            <div class="logo">NEURAL NOTE // EMG BRIDGE</div>
            <div class="version-tag">VERSIONE: v4.0</div>
        </div>

        <!-- AREA NOTA -->
        <div id="canvas-area">
            <canvas id="paintCanvas"></canvas>
        </div>

        <!-- DEBUG SENSORI ELETTRO-MIOGRAFICI (EMG) -->
        <div class="controls-row">
            <div id="debug-panel">
                <strong>LINK BRACCIALE:</strong> <span id="net-status" style="color: #ff0055;">SCONNESSO</span><br>
                <strong>IMPULSO ELETTRO-NEURALE:</strong> <span id="emg-signal">0 uV</span><br>
                <strong>COORDINATE CORRENTI:</strong> X: <span id="coord-x">0</span> | Y: <span id="coord-y">0</span>
            </div>
            
            <button class="hud-btn" onclick="connectToNeuralBand()">Forza Connessione</button>
            <button class="hud-btn" style="border-color: #ff0055; color: #ff0055;" onclick="clearCanvas()">Pulisci</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("paintCanvas");
        const ctx = canvas.getContext("2d");
        const canvasArea = document.getElementById("canvas-area");
        
        // Elementi HUD di Debug
        const netStatus = document.getElementById("net-status");
        const emgSignal = document.getElementById("emg-signal");
        const coordX = document.getElementById("coord-x");
        const coordY = document.getElementById("coord-y");

        let drawingHistory = [];
        let socket;
        let isNeuralDrawing = false;
        let lastX = 0, lastY = 0;

        function resizeCanvas() {
            canvas.width = canvasArea.clientWidth - 10;
            canvas.height = canvasArea.clientHeight - 10;
            ctx.strokeStyle = "#00e1ff"; // Colore ciano elettrico per impulsi neurali
            ctx.lineJoin = "round"; ctx.lineCap = "round"; ctx.lineWidth = 5;
            ctx.shadowBlur = 5; ctx.shadowColor = "#00e1ff";
            saveState();
        }

        // ===================================================
        // CONNESSI AI SENSORI ELETTROMIOGRAFICI VIA WEBSOCKET
        // ===================================================
        function connectToNeuralBand() {
            netStatus.innerText = "CONNESSIONE IN CORSO...";
            netStatus.style.color = "#ffaa00";

            // Ci colleghiamo al server locale eseguito dal software del tuo bracciale
            socket = new WebSocket("ws://127.0.0.1:8080");

            socket.onopen = () => {
                netStatus.innerText = "CONNESSO (EMG ONLINE)";
                netStatus.style.color = "#00ffaa";
            };

            socket.onclose = () => {
                netStatus.innerText = "SCONNESSO (Riprova)";
                netStatus.style.color = "#ff0055";
                // Tentativo di riconnessione automatica ogni 4 secondi
                setTimeout(connectToNeuralBand, 4000);
            };

            socket.onerror = (err) => {
                netStatus.innerText = "ERRORE DI CONFIGURAZIONE";
                netStatus.style.color = "#ff0055";
            };

            socket.onmessage = (event) => {
                // Leggiamo il pacchetto JSON inviato dall'hardware della banda
                try {
                    const data = JSON.parse(event.data);
                    
                    // Mostriamo l'intensità del segnale elettrico dei muscoli (EMG)
                    if (data.emg) emgSignal.innerText = data.emg + " uV";
                    
                    // Convertiamo X e Y (0-100) nei pixel del display degli occhiali
                    const actualX = (data.x / 100) * canvas.width;
                    const actualY = (data.y / 100) * canvas.height;
                    
                    coordX.innerText = Math.round(data.x);
                    coordY.innerText = Math.round(data.y);

                    // Il parametro "pressure" o "touch" indica se il dito è poggiato (attivazione elettrica muscolare)
                    if (data.touch === true || data.pressure > 10) {
                        if (!isNeuralDrawing) {
                            isNeuralDrawing = true;
                            lastX = actualX;
                            lastY = actualY;
                        } else {
                            ctx.beginPath();
                            ctx.moveTo(lastX, lastY);
                            ctx.lineTo(actualX, actualY);
                            ctx.stroke();
                            lastX = actualX;
                            lastY = actualY;
                        }
                    } else {
                        if (isNeuralDrawing) {
                            isNeuralDrawing = false;
                            saveState();
                        }
                    }
                } catch (e) {
                    // Se la banda invia stringhe di testo semplici invece di JSON
                    console.log("Dati grezzi ricevuti: ", event.data);
                }
            };
        }

        // ==========================================
        //  FUNZIONI INTERNE CANVAS
        // ==========================================
        function saveState() {
            if (drawingHistory.length >= 15) drawingHistory.shift();
            drawingHistory.push(canvas.toDataURL());
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawingHistory = []; saveState();
        }

        window.addEventListener('resize', resizeCanvas);
        // Avvia il server e il canvas
        setTimeout(() => {
            resizeCanvas();
            connectToNeuralBand();
        }, 150);
    </script>
</body>
</html>
