<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Engine Scacchi - Modulo 1 & 2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            background: #111116;
            color: #fff;
            font-family: sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: #00ffaa;
            text-shadow: 0 0 10px rgba(0, 255, 170, 0.3);
            margin-bottom: 5px;
            font-size: 1.8rem;
        }

        #status-panel {
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 20px;
            color: #aaa;
            font-size: 1rem;
        }

        /* STRUTTURA PROSPETTICA 3D */
        .viewport-3d {
            perspective: 1000px;
            padding: 20px;
        }

        #board {
            width: 440px;
            height: 440px;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            transform: rotateX(35deg) rotateZ(0deg);
            transform-style: preserve-3d;
            border: 16px solid #3a221d;
            border-radius: 4px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
            background: #22110c;
        }

        .square {
            width: 55px;
            height: 55px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: background-color 0.2s;
        }

        /* Colori ufficiali della scacchiera */
        .light { background-color: #eeeed2; }
        .dark { background-color: #769656; }

        /* Stati visivi delle caselle */
        .selected { background-color: #baca44 !important; }
        .highlighted::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: rgba(0, 255, 170, 0.7);
            border-radius: 50%;
            pointer-events: none;
        }

        /* RENDERING DEI PEZZI IN RILIEVO VIRTUALI */
        .piece {
            font-size: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            cursor: grab;
            /* Contro-rotazione per far stare i pezzi in piedi verticalmente rispetto al tavolo */
            transform: rotateX(-35deg) translateZ(5px);
            transform-style: preserve-3d;
            transition: transform 0.2s ease;
        }

        .piece.white {
            color: #ffffff;
            filter: drop-shadow(0 4px 2px rgba(0,0,0,0.6));
            text-shadow: 0 1px 0 #ccc, 0 2px 0 #bbb, 0 3px 0 #999;
        }

        .piece.black {
            color: #151515;
            filter: drop-shadow(0 4px 2px rgba(0,0,0,0.8));
            text-shadow: 0 1px 0 #333, 0 2px 0 #222, 0 3px 0 #000;
        }

        .piece:active {
            cursor: grabbing;
            transform: rotateX(-35deg) translateZ(25px) scale(1.1);
        }
    </style>
</head>
<body>

    <h1>CUSTOM CHESS ENGINE</h1>
    <div id="status-panel">Inizializzazione Moduli... [Turno: Bianco]</div>

    <div class="viewport-3d">
        <div id="board"></div>
    </div>

    <script>
        // ==========================================
        // MODULO 1: MODELLO DEI DATI (PIECE & STATE)
        // ==========================================
        class ChessPiece {
            constructor(color, type) {
                this.color = color; // 'w' o 'b'
                this.type = type;   // 'p', 'r', 'n', 'b', 'q', 'k'
                this.hasMoved = false; // Fondamentale per Arrocco e Pedoni
            }

            getUnicodeSymbol() {
                const symbols = {
                    'w': { 'k': '♔', 'q': '♕', 'r': '♖', 'b': '♗', 'n': '♘', 'p': '♙' },
                    'b': { 'k': '♚', 'q': '♛', 'r': '♜', 'b': '♝', 'n': '♞', 'p': '♟' }
                };
                return symbols[this.color][this.type];
            }
        }

        class ChessBoardState {
            constructor() {
                this.grid = Array(8).fill(null).map(() => Array(8).fill(null));
                this.currentTurn = 'w'; // Il bianco muove sempre per primo
                this.setupInitialPosition();
            }

            setupInitialPosition() {
                const backRow = ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'];
                
                // Posizionamento pezzi principali (Traversa 8 e 1)
                for (let col = 0; col < 8; col++) {
                    this.grid[0][col] = new ChessPiece('b', backRow[col]); // Neri in alto
                    this.grid[7][col] = new ChessPiece('w', backRow[col]); // Bianchi in basso
                }

                // Posizionamento Pedoni (Traversa 7 e 2)
                for (let col = 0; col < 8; col++) {
                    this.grid[1][col] = new ChessPiece('b', 'p');
                    this.grid[6][col] = new ChessPiece('w', 'p');
                }
            }

            getPieceAt(row, col) {
                return this.grid[row][col];
            }

            movePieceInternal(fromRow, fromCol, toRow, toCol) {
                const piece = this.grid[fromRow][fromCol];
                if (piece) {
                    piece.hasMoved = true;
                    this.grid[toRow][toCol] = piece;
                    this.grid[fromRow][fromCol] = null;
                    this.currentTurn = this.currentTurn === 'w' ? 'b' : 'w';
                }
            }
        }

        // ==========================================
        // MODULO 2: VIEWPORT GRAPHICS RENDERING (UI)
        // ==========================================
        class ChessGameUI {
            constructor(boardState) {
                this.state = boardState;
                this.boardElement = document.getElementById("board");
                this.statusElement = document.getElementById("status-panel");
                this.selectedSquare = null;
                
                this.initRender();
            }

            initRender() {
                this.boardElement.innerHTML = "";
                
                for (let row = 0; row < 8; row++) {
                    for (let col = 0; col < 8; col++) {
                        const square = document.createElement("div");
                        square.className = `square ${(row + col) % 2 === 0 ? 'light' : 'dark'}`;
                        square.dataset.row = row;
                        square.dataset.col = col;

                        const piece = this.state.getPieceAt(row, col);
                        if (piece) {
                            const pieceElement = document.createElement("div");
                            pieceElement.className = `piece ${piece.color === 'w' ? 'white' : 'black'}`;
                            pieceElement.innerText = piece.getUnicodeSymbol();
                            square.appendChild(pieceElement);
                        }

                        square.addEventListener("click", (e) => this.onSquareClicked(row, col));
                        this.boardElement.appendChild(square);
                    }
                }
                this.updateStatusText();
            }

            onSquareClicked(row, col) {
                const clickedPiece = this.state.getPieceAt(row, col);

                // Se non c'è nulla di selezionato
                if (this.selectedSquare === null) {
                    if (clickedPiece && clickedPiece.color === this.state.currentTurn) {
                        this.selectSquare(row, col);
                    }
                } else {
                    // Se clicchiamo sulla stessa casella, deseleziona
                    if (this.selectedSquare.row === row && this.selectedSquare.col === col) {
                        this.clearSelection();
                    } 
                    // Se clicchiamo su un altro pezzo dello stesso colore, cambiamo selezione
                    else if (clickedPiece && clickedPiece.color === this.state.currentTurn) {
                        this.clearSelection();
                        this.selectSquare(row, col);
                    } 
                    // Se si clicca su una casella vuota o nemica: esegui lo spostamento di test (Fase 1/2)
                    else {
                        this.state.movePieceInternal(this.selectedSquare.row, this.selectedSquare.col, row, col);
                        this.clearSelection();
                        this.initRender(); // Rirendorizza la posizione aggiornata
                    }
                }
            }

            selectSquare(row, col) {
                this.selectedSquare = { row, col };
                const targetSquare = this.getSquareDOMElement(row, col);
                targetSquare.classList.add("selected");
                
                // Mockup Evidenziazione: Nella prossima fase qui calcoleremo le mosse legali reali
                this.showMockHighlights(row, col);
            }

            clearSelection() {
                this.selectedSquare = null;
                document.querySelectorAll(".square").forEach(s => {
                    s.classList.remove("selected");
                    s.classList.remove("highlighted");
                });
            }

            showMockHighlights(row, col) {
                // Genera dei punti di movimento dimostrativi intorno al pezzo (saranno sostituiti dalle regole geometriche)
                const deltas = [[-1, 0], [1, 0], [0, -1], [0, 1]];
                deltas.forEach(([dr, dc]) => {
                    const r = row + dr, c = col + dc;
                    if (r >= 0 && r < 8 && c >= 0 && c < 8) {
                        const sq = this.getSquareDOMElement(r, c);
                        sq.classList.add("highlighted");
                    }
                });
            }

            getSquareDOMElement(row, col) {
                return this.boardElement.children[row * 8 + col];
            }

            updateStatusText() {
                const turnString = this.state.currentTurn === 'w' ? "Bianco" : "Nero";
                this.statusElement.innerText = `Motore Attivo. Turno corrente: ${turnString}`;
                this.statusElement.style.color = this.state.currentTurn === 'w' ? "#00ffaa" : "#ffaa00";
            }
        }

        // Lancio dell'Engine (Stato + Interfaccia Grafica)
        const engineState = new ChessBoardState();
        const engineUI = new ChessGameUI(engineState);
    </script>
</body>
</html>
