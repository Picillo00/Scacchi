<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- ISTRUZIONI ANTI-CACHE -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>Neural Note HUD - Precision Hardware Edition</title>

    <style>
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            user-select: none;
            touch-action: none;
        }

        #hud-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            border: 3px solid #00ffaa;
            box-shadow: 0 0 15px rgba(0, 255, 170, 0.4);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px;
        }

        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
            color: #aaaaaa;
        }

        .logo {
            color: #00ffaa;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 170, 0.4);
        }

        #canvas-area {
            flex-grow: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin: 10px 0;
        }

        canvas {
            background-color: #0a0a0a;
            border: 2px solid rgba(0, 255, 170, 0.2);
            border-radius: 8px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
        }

        .controls-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 5px;
        }

        .hud-btn {
            background: rgba(0, 255, 170, 0.1);
            border: 1px solid #00ffaa;
            color: #00ffaa;
            padding: 8px 20px;
            font-size: 1rem;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .hud-btn:active {
            background: #00ffaa;
            color: #050505;
        }

        .hud-footer {
            font-size: 0.85rem;
            color: #666;
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div id="hud-container">
        <div class="hud-header">
            <div class="logo">NEURAL NOTE // HARDWARE BRIDGE</div>
            <div id="status-mode" style="color: #00ffaa;">INPUT: PRONTO</div>
        </div>

        <div id="canvas-area">
            <canvas id="paintCanvas"></canvas>
        </div>

        <div class="controls-row">
            <button class="hud-btn" onclick="clearCanvas()">Pulisci Pagina</button>
            <button class="hud-btn" style="border-color: #ff0055; color: #ff0055;" onclick="undoLastStroke()">Annulla Tratto</button>
        </div>

        <div class="hud-footer">
            [Ponte Hardware Attivo] Se muovi il dito sulla superficie e la banda trasmette le coordinate,<br>
            il disegno apparirà istantaneamente sullo schermo degli occhiali.
        </div>
    </div>

    <script>
        const canvas = document.getElementById("paintCanvas");
        const ctx = canvas.getContext("2d");
        const canvasArea = document.getElementById("canvas-area");
        const statusMode = document.getElementById("status-mode");

        let drawingHistory = [];
        let isHardwareDrawing = false;
        let lastX = 0, lastY = 0;

        function resizeCanvas() {
            canvas.width = canvasArea.clientWidth - 10;
            canvas.height = canvasArea.clientHeight - 10;
            
            ctx.strokeStyle = "#00ffaa";
            ctx.lineJoin = "round";
            ctx.lineCap = "round";
            ctx.lineWidth = 5; // Più spesso per vederlo bene nei display AR
            ctx.shadowBlur = 6;
            ctx.shadowColor = "#00ffaa";
            
            saveState();
        }

        // ==========================================
        //  PONTE DI COMUNICAZIONE PER LA NEURAL BAND
        // ==========================================
        
        /**
         * Questa funzione riceve i dati direttamente dal software del tuo bracciale.
         * @param {string} action - Può essere 'START' (poggi il dito), 'MOVE' (trascini), 'STOP' (alzi il dito)
         * @param {number} normalizedX - Coordinata X da 0 a 100 o pixel reali
         * @param {number} normalizedY - Coordinata Y da 0 a 100 o pixel reali
         */
        function receiveNeuralHardwareCoords(action, normalizedX, normalizedY) {
            statusMode.innerText = "INPUT: RILEVATO";
            statusMode.style.color = "#00ffaa";

            // Convertiamo le coordinate percentuali (0-100) nei pixel effettivi del canvas degli occhiali
            const actualX = (normalizedX / 100) * canvas.width;
            const actualY = (normalizedY / 100) * canvas.height;

            if (action === 'START') {
                isHardwareDrawing = true;
                lastX = actualX;
                lastY = actualY;
            } 
            else if (action === 'MOVE' && isHardwareDrawing) {
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(actualX, actualY);
                ctx.stroke();
                
                lastX = actualX;
                lastY = actualY;
            } 
            else if (action === 'STOP') {
                isHardwareDrawing = false;
                saveState();
            }
        }

        // Esponiamo la funzione a livello globale (finestra) così l'app della banda può chiamarla
        window.receiveNeuralHardwareCoords = receiveNeuralHardwareCoords;


        // ==========================================
        //  COMPATIBILITÀ DI BACKUP (TOUCH SCHERMO)
        // ==========================================
        let isTouchDrawing = false;

        canvas.addEventListener("touchstart", (e) => {
            isTouchDrawing = true;
            const rect = canvas.getBoundingClientRect();
            lastX = e.touches[0].clientX - rect.left;
            lastY = e.touches[0].clientY - rect.top;
        });

        canvas.addEventListener("touchmove", (e) => {
            if (!isTouchDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const currentX = e.touches[0].clientX - rect.left;
            const currentY = e.touches[0].clientY - rect.top;

            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(currentX, currentY);
            ctx.stroke();

            lastX = currentX;
            lastY = currentY;
            e.preventDefault();
        });

        window.addEventListener("touchend", () => {
            if (isTouchDrawing) {
                isTouchDrawing = false;
                saveState();
            }
        });


        // ==========================================
        //  FUNZIONI DI SERVIZIO (CANCELLA / UNDO)
        // ==========================================
        function saveState() {
            if (drawingHistory.length >= 25) drawingHistory.shift();
            drawingHistory.push(canvas.toDataURL());
        }

        function undoLastStroke() {
            if (drawingHistory.length > 1) {
                drawingHistory.pop();
                const previousStateImg = new Image();
                previousStateImg.src = drawingHistory[drawingHistory.length - 1];
                previousStateImg.onload = function() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(previousStateImg, 0, 0);
                };
            } else if (drawingHistory.length === 1) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawingHistory = [];
            saveState();
        }

        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 150);

    </script>
</body>
</html>
