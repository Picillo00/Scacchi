<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- ISTRUZIONI ANTI-CACHE PER GLI OCCHIALI -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>YouTube Search HUD - Smart Glasses Edition</title>

    <style>
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            user-select: none;
            touch-action: none;
        }

        /* Contenitore HUD con bordo rosso YouTube */
        #youtube-hud {
            position: relative;
            width: 100vw;
            height: 100vh;
            border: 3px solid #ff0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px;
        }

        /* Intestazione con Barra di Ricerca Vera */
        .hud-header {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
        }

        .yt-logo {
            color: #ff0000;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.4);
        }

        /* VERABARRA DI RICERCA TESTUALE */
        .search-container {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        #search-input {
            width: 90%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #ff0000;
            border-radius: 20px;
            padding: 8px 15px;
            color: #ffffff;
            font-size: 1.1rem;
            outline: none;
            text-align: center;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        #search-input:focus {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
            border-color: #ffffff;
        }

        /* Player Video Centrale */
        .video-player-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #video-screen {
            width: 80%;
            height: 45vh;
            background: linear-gradient(45deg, #111, #222);
            border: 2px solid #333;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        #status-icon {
            font-size: 4rem;
            color: rgba(255, 255, 255, 0.6);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .video-details {
            margin-top: 15px;
            text-align: center;
            max-width: 80%;
        }

        #video-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        #video-channel {
            font-size: 1.1rem;
            color: #ff0000;
        }

        #hud-overlay-text {
            position: absolute;
            top: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 1rem;
            border: 1px solid #ff0000;
            display: none;
            z-index: 10;
        }

        .hud-footer {
            font-size: 0.9rem;
            color: #555;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="youtube-hud">
        <!-- BARRA SUPERIORE DI RICERCA -->
        <div class="hud-header">
            <div class="header-top">
                <div class="yt-logo">YOUTUBE // HUD</div>
                <div id="volume-display">VOL: 70%</div>
            </div>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Digita per cercare..." autocomplete="off">
            </div>
        </div>

        <!-- AREA RIPRODUZIONE -->
        <div class="video-player-area" onclick="togglePlayPause()">
            <div id="hud-overlay-text">Notifica</div>
            
            <div id="video-screen">
                <div id="status-icon">⏸</div>
            </div>

            <div class="video-details">
                <div id="video-title">Digita qualcosa e premi Invio</div>
                <div id="video-channel">In attesa di ricerca</div>
            </div>
        </div>

        <!-- GUIDA COMANDI -->
        <div class="hud-footer">
            Scrivi e premi Invio • Swipe DX/SX: Cambia Video trovato • Swipe SU/GIÙ: Volume
        </div>
    </div>

    <script>
        const videoTitle = document.getElementById("video-title");
        const videoChannel = document.getElementById("video-channel");
        const videoScreen = document.getElementById("video-screen");
        const statusIcon = document.getElementById("status-icon");
        const volumeDisplay = document.getElementById("volume-display");
        const hudOverlayText = document.getElementById("hud-overlay-text");
        const youtubeHud = document.getElementById("youtube-hud");
        const searchInput = document.getElementById("search-input");

        // Database di video finti divisi per categorie di ricerca
        const videoDatabase = {
            "default": [
                { titolo: "Benvenuto su YouTube HUD - Scrivi in alto per cercare", canale: "Sistema AR", colore: "linear-gradient(45deg, #111, #222)" }
            ],
            "gaming": [
                { titolo: "SNAKE GAMEPLAY - Record Mondiale Assoluto (9999 Punti)", canale: "Retro Gaming IT", colore: "linear-gradient(45deg, #003311, #111)" },
                { titolo: "GTA 6 - Trailer di Gameplay Ufficiale 4K", canale: "Rockstar Games", colore: "linear-gradient(45deg, #330033, #111)" }
            ],
            "tecnologia": [
                { titolo: "MKBHD - Il futuro degli Smart Glasses in Realtà Aumentata", canale: "Marques Brownlee", colore: "linear-gradient(45deg, #2b0000, #111)" },
                { titolo: "Neuralink e Neural Bands: Come controllare tutto con la mente", canale: "Tech Inside", colore: "linear-gradient(45deg, #001f3f, #111)" }
            ],
            "musica": [
                { titolo: "Synthwave Beats per programmare / studiare (24/7 Live Stream)", canale: "Lofi Girl", colore: "linear-gradient(45deg, #120024, #111)" },
                { titolo: "Canzoni del momento 2026 - Top 50 Global", canale: "Hits Radio", colore: "linear-gradient(45deg, #443300, #111)" }
            ]
        };

        let currentResults = [...videoDatabase["default"]];
        let currentVideoIndex = 0;
        let isPlaying = true;
        let volume = 70;

        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;

        // Gestione della pressione del tasto INVIO nella barra di ricerca
        searchInput.addEventListener("keydown", function(e) {
            if (e.keyCode === 13) { // 13 è il tasto Invio
                executeSearch(searchInput.value.toLowerCase().trim());
                searchInput.blur(); // Toglie il focus per permettere di rigiocare/usare gli swipe
            }
        });

        function executeSearch(query) {
            let trovato = false;
            
            // Controlla se la parola scritta corrisponde a un nostro archivio
            for (let key in videoDatabase) {
                if (query.includes(key) && key !== "default") {
                    currentResults = [...videoDatabase[key]];
                    trovato = true;
                    break;
                }
            }

            // Se non trova nulla, genera un video finto basato su quello che hai scritto tu!
            if (!trovato && query !== "") {
                currentResults = [
                    { titolo: `Risultato personalizzato per: "${searchInput.value}"`, canale: "Ricerca Algoritmo", colore: "linear-gradient(45deg, #222, #444)" },
                    { titolo: `Video Correlato a ${searchInput.value} #2`, canale: "User Generation", colore: "linear-gradient(45deg, #333, #111)" }
                ];
            }

            currentVideoIndex = 0;
            loadVideo(currentVideoIndex);
            showNotification("Ricerca effettuata!");
        }

        function loadVideo(index) {
            if(currentResults.length === 0) return;
            const video = currentResults[index];
            videoTitle.innerText = video.titolo;
            videoChannel.innerText = video.canale;
            videoScreen.style.background = video.colore;
            
            youtubeHud.style.borderColor = "#00ff00";
            setTimeout(() => { youtubeHud.style.borderColor = "#ff0000"; }, 300);
        }

        function togglePlayPause() {
            // Evita di mettere in pausa se l'utente sta cliccando la barra di ricerca
            if (document.activeElement === searchInput) return;

            isPlaying = !isPlaying;
            if (!isPlaying) {
                statusIcon.innerText = "⏸";
                statusIcon.style.opacity = "1";
                youtubeHud.style.borderColor = "#555555";
            } else {
                statusIcon.innerText = "▶";
                statusIcon.style.opacity = "1";
                setTimeout(() => { if(isPlaying) statusIcon.style.opacity = "0"; }, 500);
                youtubeHud.style.borderColor = "#ff0000";
            }
        }

        function showNotification(text) {
            hudOverlayText.innerText = text;
            hudOverlayText.style.display = "block";
            setTimeout(() => { hudOverlayText.style.display = "none"; }, 1500);
        }

        // GESTIONE SWIPE
        window.addEventListener("touchstart", (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: false });

        window.addEventListener("touchend", (e) => {
            touchEndX = e.changedTouches[0].screenX;
            touchEndY = e.changedTouches[0].screenY;
            // Se l'utente sta scrivendo, non attivare gli swipe di cambio video
            if (document.activeElement !== searchInput) {
                handleSwipe();
            }
        }, { passive: false });

        window.addEventListener("touchmove", (e) => { 
            if (document.activeElement !== searchInput) e.preventDefault(); 
        }, { passive: false });

        function handleSwipe() {
            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;
            const threshold = 40; 

            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (Math.abs(diffX) > threshold) {
                    if (diffX > 0) moveNeural('RIGHT');
                    else moveNeural('LEFT');
                }
            } else {
                if (Math.abs(diffY) > threshold) {
                    if (diffY > 0) moveNeural('DOWN');
                    else moveNeural('UP');
                }
            }
        }

        function moveNeural(direction) {
            if (document.activeElement === searchInput) return; // Blocca se si scrive

            switch(direction.toUpperCase()) {
                case 'RIGHT':
                    currentVideoIndex = (currentVideoIndex + 1) % currentResults.length;
                    loadVideo(currentVideoIndex);
                    break;
                case 'LEFT':
                    currentVideoIndex = (currentVideoIndex - 1 + currentResults.length) % currentResults.length;
                    loadVideo(currentVideoIndex);
                    break;
                case 'UP':
                    if (volume < 100) volume += 10;
                    volumeDisplay.innerText = `VOL: ${volume}%`;
                    showNotification(`Volume ${volume}%`);
                    break;
                case 'DOWN':
                    if (volume > 0) volume -= 10;
                    volumeDisplay.innerText = `VOL: ${volume}%`;
                    showNotification(`Volume ${volume}%`);
                    break;
            }
        }
        window.moveNeural = moveNeural;

        // Mappatura frecce per test su PC (attive solo se non si sta scrivendo nell'input)
        window.addEventListener("keydown", (e) => {
            if (document.activeElement === searchInput) return;
            if (e.keyCode === 39) moveNeural('RIGHT');
            if (e.keyCode === 37) moveNeural('LEFT');
            if (e.keyCode === 38) moveNeural('UP');
            if (e.keyCode === 40) moveNeural('DOWN');
        });

        // Avvio iniziale
        loadVideo(0);
    </script>
</body>
</html>
