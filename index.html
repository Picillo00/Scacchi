<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- FORZATURA ANTI-CACHE TOTALMENTE AGGRESSIVA -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>Neural Note HUD - v3.2</title>

    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #050505; font-family: sans-serif; color: #ffffff;
            user-select: none; touch-action: none;
        }

        #hud-container {
            position: relative; width: 100vw; height: 100vh;
            border: 3px solid #00ffaa; box-shadow: 0 0 15px rgba(0, 255, 170, 0.4);
            display: flex; flex-direction: column; justify-content: space-between; padding: 15px;
        }

        .hud-header {
            display: flex; justify-content: space-between; align-items: center;
        }

        .logo { color: #00ffaa; font-weight: bold; letter-spacing: 2px; }
        
        /* VERSIONE GIGANTE PER CONTROLLO */
        .version-tag {
            background: #00ffaa; color: black; padding: 5px 12px; 
            border-radius: 5px; font-weight: bold; font-size: 1.1rem;
            box-shadow: 0 0 10px #00ffaa;
        }

        #canvas-area {
            flex-grow: 1; width: 100%; display: flex; justify-content: center; align-items: center; margin: 10px 0;
            position: relative;
        }

        canvas { background-color: #0a0a0a; border: 2px solid rgba(0, 255, 170, 0.2); border-radius: 8px; }

        /* Mirino virtuale per vedere dove punta il giroscopio */
        #pointer-dot {
            position: absolute; width: 12px; height: 12px; background: #ff0055;
            border-radius: 50%; box-shadow: 0 0 10px #ff0055; pointer-events: none;
            transform: translate(-50%, -50%); left: 50%; top: 50%;
        }

        .controls-row { display: flex; justify-content: center; gap: 10px; align-items: center; flex-wrap: wrap; }

        #debug-panel {
            font-family: monospace; font-size: 0.75rem; color: #aaa;
            background: rgba(255, 255, 255, 0.05); padding: 8px; border-radius: 5px;
            border: 1px solid #333; text-align: left; min-width: 220px;
        }

        .hud-btn {
            background: rgba(0, 255, 170, 0.1); border: 1px solid #00ffaa; color: #00ffaa;
            padding: 8px 15px; font-size: 0.9rem; border-radius: 20px; font-weight: bold; cursor: pointer;
        }
        .hud-btn:active { background: #00ffaa; color: #050505; }
    </style>
</head>
<body>

    <div id="hud-container">
        <!-- BARRA SUPERIORE CON VERSIONE -->
        <div class="hud-header">
            <div class="logo">NEURAL NOTE // GYRO DRAW</div>
            <div class="version-tag">VERSIONE: v3.2</div>
        </div>

        <!-- AREA NOTA CON PUNTATORE ROSSO -->
        <div id="canvas-area">
            <canvas id="paintCanvas"></canvas>
            <div id="pointer-dot"></div>
        </div>

        <!-- PANNELLO DI CONTROLLO E DEBUG -->
        <div class="controls-row">
            <div id="debug-panel">
                <strong>PUNTATORE:</strong> X: <span id="log-x">50</span>% | Y: <span id="log-y">50</span>%<br>
                <strong>STATO PENNA:</strong> <span id="log-pen" style="color:#ff0055;">ALZATA (Non scrive)</span>
            </div>
            
            <button class="hud-btn" style="border-color: #ffaa00; color: #ffaa00;" onclick="requestGyroPermission()">1. Connetti Sensori</button>
            <button class="hud-btn" style="border-color: #ff0055; color: #ff0055;" id="btn-draw" onclick="togglePen()">2. Abbassa Penna</button>
            <button class="hud-btn" onclick="clearCanvas()">Pulisci</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("paintCanvas");
        const ctx = canvas.getContext("2d");
        const canvasArea = document.getElementById("canvas-area");
        const pointerDot = document.getElementById("pointer-dot");
        const logX = document.getElementById("log-x");
        const logY = document.getElementById("log-y");
        const logPen = document.getElementById("log-pen");
        const btnDraw = document.getElementById("btn-draw");

        let drawingHistory = [];
        let isDrawing = false;
        
        // Posizione iniziale del cursore (Centro schermo)
        let currentX = 0;
        let currentY = 0;
        let lastX = 0;
        let lastY = 0;

        // Sensibilità del movimento (modifica questo valore per aumentare/diminuire la velocità del cursore)
        const sensitivity = 2.5; 

        function resizeCanvas() {
            canvas.width = canvasArea.clientWidth - 10;
            canvas.height = canvasArea.clientHeight - 10;
            ctx.strokeStyle = "#00ffaa";
            ctx.lineJoin = "round"; ctx.lineCap = "round"; ctx.lineWidth = 6;
            ctx.shadowBlur = 4; ctx.shadowColor = "#00ffaa";
            
            currentX = canvas.width / 2;
            currentY = canvas.height / 2;
            saveState();
        }

        // ==========================================
        //  ATTIVAZIONE E CALCOLO DEL GIROSCOPIO
        // ==========================================
        function requestGyroPermission() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleGyroMovement);
                        }
                    }).catch(err => alert("Errore sensori: " + err));
            } else {
                window.addEventListener('deviceorientation', handleGyroMovement);
            }
        }

        function handleGyroMovement(event) {
            // Gamma controlla l'asse Sinistra/Destra, Beta controlla l'asse Alto/Basso
            let gyroX = event.gamma || 0; 
            let gyroY = event.beta || 0;

            // Mappatura fluida sul canvas basata sull'inclinazione
            // Spostiamo il cursore in base a quanto inclini il polso/dispositivo
            currentX += gyroX * sensitivity * 0.15;
            currentY += (gyroY - 45) * sensitivity * 0.15; // Sottraiamo 45° ipotizzando una postura naturale inclinata

            // Limiti del foglio per evitare di andare fuori schermo
            if (currentX < 0) currentX = 0;
            if (currentX > canvas.width) currentX = canvas.width;
            if (currentY < 0) currentY = 0;
            if (currentY > canvas.height) currentY = canvas.height;

            // Sposta il pallino rosso visivo sulla HUD
            pointerDot.style.left = `${currentX + 5}px`;
            pointerDot.style.top = `${currentY + 5}px`;

            logX.innerText = Math.round((currentX / canvas.width) * 100);
            logY.innerText = Math.round((currentY / canvas.height) * 100);

            // Se la penna è "Abbassata", disegna la linea dal punto precedente a quello attuale
            if (isDrawing) {
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(currentX, currentY);
                ctx.stroke();
            }

            lastX = currentX;
            lastY = currentY;
        }

        // ==========================================
        //  INTERRUTTORE PENNA (Abbiassa/Alza per scrivere)
        // ==========================================
        function togglePen() {
            isDrawing = !isDrawing;
            if (isDrawing) {
                logPen.innerText = "✍️ IN SCRITTURA";
                logPen.style.color = "#00ffaa";
                btnDraw.innerText = "Alza Penna";
                btnDraw.style.borderColor = "#00ffaa";
                btnDraw.style.color = "#00ffaa";
                // Resetta il punto iniziale per non creare linee rette strane quando si riattacca la penna
                lastX = currentX;
                lastY = currentY;
            } else {
                logPen.innerText = "ALZATA (Non scrive)";
                logPen.style.color = "#ff0055";
                btnDraw.innerText = "Abbassa Penna";
                btnDraw.style.borderColor = "#ff0055";
                btnDraw.style.color = "#ff0055";
                saveState();
            }
        }

        // ==========================================
        //  FUNZIONI CANVAS STANDARD
        // ==========================================
        function saveState() {
            if (drawingHistory.length >= 15) drawingHistory.shift();
            drawingHistory.push(canvas.toDataURL());
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawingHistory = []; saveState();
        }

        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 150);
    </script>
</body>
</html>
