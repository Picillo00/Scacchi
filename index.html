<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- ISTRUZIONI ANTI-CACHE PER GLI OCCHIALI -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>YouTube HUD - Smart Glasses Edition</title>

    <style>
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            user-select: none;
            touch-action: none;
        }

        /* Contenitore HUD con bordo rosso YouTube */
        #youtube-hud {
            position: relative;
            width: 100vw;
            height: 100vh;
            border: 3px solid #ff0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px;
            transition: border-color 0.2s ease;
        }

        /* Intestazione minimale */
        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
            color: #aaaaaa;
        }

        .yt-logo {
            color: #ff0000;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.4);
        }

        /* Area Video Centrale (Player finto/simulato per fluidità in AR) */
        .video-player-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Box del finto video animato */
        #video-screen {
            width: 80%;
            height: 50vh;
            background: linear-gradient(45deg, #111, #222);
            border: 2px solid #333;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        /* Icona di Play/Pause temporanea al centro */
        #status-icon {
            font-size: 4rem;
            color: rgba(255, 255, 255, 0.6);
            text-shadow: 0 0 15px rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* Dettagli del video in riproduzione */
        .video-details {
            margin-top: 15px;
            text-align: center;
            max-width: 80%;
        }

        #video-title {
            font-size: 1.6rem;
            font-weight: bold;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #video-channel {
            font-size: 1.1rem;
            color: #ff0000;
        }

        /* Overlay di notifica Volume / Stato */
        #hud-overlay-text {
            position: absolute;
            top: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 1.1rem;
            border: 1px solid #ff0000;
            display: none;
        }

        /* Barra inferiore dei comandi */
        .hud-footer {
            font-size: 0.9rem;
            color: #444;
            text-align: center;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="youtube-hud" onclick="togglePlayPause()">
        <!-- HEADERS -->
        <div class="hud-header">
            <div class="yt-logo">YOUTUBE // HUD</div>
            <div id="volume-display">VOL: 70%</div>
        </div>

        <!-- PLAYER CENTRALE -->
        <div class="video-player-area">
            <div id="hud-overlay-text">Volume 70%</div>
            
            <div id="video-screen">
                <!-- Icona di stato che compare quando metti in pausa -->
                <div id="status-icon">⏸</div>
            </div>

            <div class="video-details">
                <div id="video-title">Caricamento...</div>
                <div id="video-channel">Canale</div>
            </div>
        </div>

        <!-- FOOTER DI GUIDA -->
        <div class="hud-footer">
            Swipe DX/SX: Traccia • Swipe SU/GIÙ: Volume • Click: Play/Pause
        </div>
    </div>

    <script>
        const videoTitle = document.getElementById("video-title");
        const videoChannel = document.getElementById("video-channel");
        const videoScreen = document.getElementById("video-screen");
        const statusIcon = document.getElementById("status-icon");
        const volumeDisplay = document.getElementById("volume-display");
        const hudOverlayText = document.getElementById("hud-overlay-text");
        const youtubeHud = document.getElementById("youtube-hud");

        // Playlist di video simulati
        const playlist = [
            { titolo: "MKBHD - Il futuro degli Smart Glasses (2026)", canale: "Marques Brownlee", colore: "linear-gradient(45deg, #2b0000, #111)" },
            { titolo: "Neuralink e Neural Bands: Come funzionano?", canale: "Tech Inside", colore: "linear-gradient(45deg, #001f3f, #111)" },
            { titolo: "SNAKE GAMEPLAY - Record Mondiale 9999", canale: "Retro Gaming IT", colore: "linear-gradient(45deg, #003311, #111)" }
        ];

        let currentVideoIndex = 0;
        let isPlaying = true;
        let volume = 70;

        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;

        // Inizializza il primo video
        function loadVideo(index) {
            const video = playlist[index];
            videoTitle.innerText = video.titolo;
            videoChannel.innerText = video.canale;
            videoScreen.style.background = video.colore;
            
            // Lampeggio verde sul bordo per indicare il cambio video
            youtubeHud.style.borderColor = "#00ff00";
            setTimeout(() => { youtubeHud.style.borderColor = "#ff0000"; }, 300);
        }

        // Play e Pause intermedi
        function togglePlayPause() {
            isPlaying = !isPlaying;
            if (!isPlaying) {
                statusIcon.innerText = "⏸";
                statusIcon.style.opacity = "1";
                youtubeHud.style.borderColor = "#555555"; // Bordo grigio in pausa
            } else {
                statusIcon.innerText = "▶";
                statusIcon.style.opacity = "1";
                setTimeout(() => { if(isPlaying) statusIcon.style.opacity = "0"; }, 500);
                youtubeHud.style.borderColor = "#ff0000";
            }
        }

        // Mostra popup temporaneo per il volume
        function showNotification(text) {
            hudOverlayText.innerText = text;
            hudOverlayText.style.display = "block";
            setTimeout(() => { hudOverlayText.style.display = "none"; }, 1000);
        }

        // GESTIONE SWIPE / INTERAZIONE
        window.addEventListener("touchstart", (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: false });

        window.addEventListener("touchend", (e) => {
            touchEndX = e.changedTouches[0].screenX;
            touchEndY = e.changedTouches[0].screenY;
            handleSwipe();
        }, { passive: false });

        window.addEventListener("touchmove", (e) => { e.preventDefault(); }, { passive: false });

        function handleSwipe() {
            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;
            const threshold = 40; 

            if (Math.abs(diffX) > Math.abs(diffY)) {
                // Swipe Orizzontale (Cambio Video)
                if (Math.abs(diffX) > threshold) {
                    if (diffX > 0) moveNeural('RIGHT');
                    else moveNeural('LEFT');
                }
            } else {
                // Swipe Verticale (Volume)
                if (Math.abs(diffY) > threshold) {
                    if (diffY > 0) moveNeural('DOWN');
                    else moveNeural('UP');
                }
            }
        }

        // FUNZIONE LOGICA PER LA NEURAL BAND
        function moveNeural(direction) {
            switch(direction.toUpperCase()) {
                case 'RIGHT': // Prossimo Video
                    currentVideoIndex = (currentVideoIndex + 1) % playlist.length;
                    loadVideo(currentVideoIndex);
                    isPlaying = true;
                    statusIcon.style.opacity = "0";
                    break;
                case 'LEFT': // Video Precedente
                    currentVideoIndex = (currentVideoIndex - 1 + playlist.length) % playlist.length;
                    loadVideo(currentVideoIndex);
                    isPlaying = true;
                    statusIcon.style.opacity = "0";
                    break;
                case 'UP': // Alza Volume
                    if (volume < 100) volume += 10;
                    volumeDisplay.innerText = `VOL: ${volume}%`;
                    showNotification(`Volume ${volume}%`);
                    break;
                case 'DOWN': // Abbassa Volume
                    if (volume > 0) volume -= 10;
                    volumeDisplay.innerText = `VOL: ${volume}%`;
                    showNotification(`Volume ${volume}%`);
                    break;
            }
        }

        // Rendi la funzione disponibile per i test esterni della banda
        window.moveNeural = moveNeural;

        // Mappatura tastiera PC per i test rapido
        window.addEventListener("keydown", (e) => {
            if (e.keyCode === 39) moveNeural('RIGHT');
            if (e.keyCode === 37) moveNeural('LEFT');
            if (e.keyCode === 38) moveNeural('UP');
            if (e.keyCode === 40) moveNeural('DOWN');
            if (e.keyCode === 32) togglePlayPause(); // Barra spaziatrice
        });

        // Carica il primo video all'avvio
        loadVideo(currentVideoIndex);

    </script>
</body>
</html>
